<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un livre</title>
</head>
<body>
    <h1>Ajouter un livre via ISBN</h1>

    {% if erreur %}
        <p style="color: red;">{{ erreur }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="text" name="isbn" placeholder="Entrez l'ISBN" required>
        <button type="submit">Ajouter</button>
    </form>

    <a href="{% url 'liste_livres' %}">Retour à la liste</a>
</body>
</html>
